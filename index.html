<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Gift Collection</title>
    <style>
        :root {
            --bg: #0f0f10;
            --card-bg: #1a1a1c;
            --accent: #0088cc;
            --text: #eeeeee;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0;
            line-height: 1.6;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(15, 15, 16, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 0 0 15px 0; font-size: 1.5rem; font-weight: 300; letter-spacing: 1px; }

        /* Поле ввода ссылки */
        .checker-wrap {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        #gift-url {
            flex: 1;
            background: #252528;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px 15px;
            color: white;
            outline: none;
        }

        #gift-url:focus { border-color: var(--accent); }

        .check-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .check-btn:hover { opacity: 0.8; }

        /* Результаты анализа */
        #analysis-result {
            display: none;
            background: #1a1a1c;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
            font-size: 14px;
        }

        .color-dot { width: 12px; height: 12px; border-radius: 50%; }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .btn {
            width: 34px; height: 34px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s;
            position: relative;
        }

        .btn:hover, .btn.active { transform: scale(1.2); border-color: #fff; z-index: 10; }

        .btn::after {
            content: attr(data-name);
            position: absolute; bottom: -35px; left: 50%;
            transform: translateX(-50%);
            background: #000; color: #fff;
            padding: 4px 8px; border-radius: 4px;
            font-size: 10px; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .btn:hover::after { opacity: 1; }

        .btn-all { width: auto; border-radius: 20px; padding: 0 15px; color: white; }

        .container {
            padding: 30px; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px; max-width: 1400px; margin: 0 auto;
        }

        .card {
            background: var(--card-bg); border-radius: 16px;
            padding: 15px; text-align: center; transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .card:hover { transform: translateY(-10px); background: #222225; }
        .card img { width: 100%; border-radius: 12px; }
        .info { margin-top: 15px; font-size: 12px; color: #aaa; overflow: hidden; text-overflow: ellipsis; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>GIFT GALLERY</h1>
    
    <div class="checker-wrap">
        <input type="text" id="gift-url" placeholder="Вставь ссылку: https://t.me/nft/...">
        <button class="check-btn" onclick="checkCompatibility()">Анализ</button>
    </div>

    <div id="analysis-result">
        <h3 style="margin-top:0; font-size: 16px;">📊 Совместимость с фонами:</h3>
        <div id="result-list"></div>
    </div>

    <div class="filters" id="filters">
        <button class="btn btn-all active" id="btn-all" data-name="ALL" onclick="filter('all', this)">ALL</button>
    </div>
</div>

<div class="container" id="container"></div>

<script>
    const colorMap = {
        "Ivory White": "rgb(206, 206, 206)", "Platinum": "rgb(169, 169, 163)", "Roman Silver": "rgb(142, 144, 154)",
        "Steel Grey": "rgb(117, 123, 126)", "Battleship Grey": "rgb(119, 117, 105)", "Feldgrau": "rgb(99, 107, 96)",
        "Rifle Green": "rgb(75, 77, 66)", "Black": "rgb(36, 36, 36)", "Onyx Black": "rgb(59, 60, 60)",
        "Gunmetal": "rgb(61, 72, 74)", "Seal Brown": "rgb(89, 62, 55)", "Burgundy": "rgb(145, 78, 83)",
        "Rosewood": "rgb(169, 107, 100)", "Desert Sand": "rgb(179, 155, 117)", "Cappuccino": "rgb(163, 131, 109)",
        "Chocolate": "rgb(150, 92, 65)", "Chestnut": "rgb(188, 92, 61)", "Carmine": "rgb(214, 62, 51)",
        "Fire Engine": "rgb(232, 70, 63)", "Burnt Sienna": "rgb(207, 99, 47)", "Copper": "rgb(181, 112, 60)",
        "Tomato": "rgb(228, 87, 46)", "Mystic Pearl": "rgb(207, 106, 98)", "Strawberry": "rgb(212, 105, 90)",
        "Coral Red": "rgb(209, 109, 84)", "Carrot Juice": "rgb(237, 139, 76)", "Persimmon": "rgb(229, 129, 57)",
        "Orange": "rgb(225, 142, 36)", "Amber": "rgb(218, 165, 32)", "Caramel": "rgb(210, 145, 36)",
        "Mustard": "rgb(210, 140, 0)", "Old Gold": "rgb(164, 130, 45)", "Satin Gold": "rgb(179, 148, 51)",
        "Pure Gold": "rgb(201, 168, 57)", "Light Olive": "rgb(178, 159, 77)", "Khaki Green": "rgb(148, 153, 90)",
        "Pistachio": "rgb(138, 162, 102)", "Camo Green": "rgb(115, 129, 63)", "Lemongrass": "rgb(151, 184, 71)",
        "Shamrock Green": "rgb(99, 172, 74)", "Malachite": "rgb(91, 178, 70)", "Mint Green": "rgb(110, 189, 122)",
        "Emerald": "rgb(92, 181, 116)", "Hunter Green": "rgb(107, 138, 83)", "Pine Green": "rgb(99, 144, 111)",
        "Tactical Pine": "rgb(66, 120, 99)", "Dark Green": "rgb(63, 77, 47)", "Ranger Green": "rgb(91, 100, 58)",
        "Gunship Green": "rgb(85, 107, 86)", "Jade Green": "rgb(71, 178, 139)", "Pacific Green": "rgb(94, 186, 148)",
        "Turquoise": "rgb(79, 182, 177)", "Deep Cyan": "rgb(33, 169, 164)", "Aquamarine": "rgb(77, 187, 181)",
        "Pacific Cyan": "rgb(69, 169, 192)", "Azure Blue": "rgb(107, 183, 212)", "Sky Blue": "rgb(113, 178, 217)",
        "Celtic Blue": "rgb(72, 158, 230)", "Sapphire": "rgb(106, 149, 214)", "French Blue": "rgb(81, 138, 191)",
        "Moonstone": "rgb(129, 170, 168)", "Silver Blue": "rgb(131, 153, 169)", "Indigo Dye": "rgb(82, 110, 128)",
        "Midnight Blue": "rgb(78, 83, 101)", "Marine Blue": "rgb(91, 110, 158)", "Cobalt Blue": "rgb(95, 127, 205)",
        "Navy Blue": "rgb(111, 143, 223)", "Neon Blue": "rgb(116, 134, 250)", "Electric Indigo": "rgb(131, 114, 247)",
        "Cyberpunk": "rgb(144, 121, 235)", "Lavender": "rgb(178, 138, 224)", "French Violet": "rgb(183, 104, 241)",
        "Electric Purple": "rgb(198, 113, 229)", "English Violet": "rgb(172, 141, 164)", "Grape": "rgb(155, 112, 193)",
        "Purple": "rgb(153, 97, 163)", "Dark Lilac": "rgb(177, 131, 153)", "Fandango": "rgb(204, 121, 156)",
        "Mexican Pink": "rgb(225, 97, 139)", "Raspberry": "rgb(215, 125, 129)"
    };

    let giftData = {};

    fetch('gifts_data.json')
        .then(res => res.json())
        .then(data => {
            giftData = data;
            createFilters();
            render('all');
        });

    function createFilters() {
        const filtersDiv = document.getElementById('filters');
        Object.keys(giftData).sort().forEach(color => {
            if (giftData[color].length > 0) {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.style.backgroundColor = colorMap[color];
                btn.setAttribute('data-name', `${color} (${giftData[color].length})`);
                btn.onclick = () => filter(color, btn);
                filtersDiv.appendChild(btn);
            }
        });
    }

    function checkCompatibility() {
    let input = document.getElementById('gift-url').value.trim();
    if (!input) return;

    let searchName = "";

    // 1. Извлекаем название из ссылки или берем текст
    if (input.includes('t.me/nft/')) {
        // Из "https://t.me/nft/EvilEye-5729" получаем "evileye"
        let lastPart = input.split('/').pop(); 
        searchName = lastPart.split('-')[0].toLowerCase(); 
    } else {
        searchName = input.toLowerCase();
    }

    let results = [];

    // 2. Ищем по всей базе данных
    for (let colorName in giftData) {
        giftData[colorName].forEach(item => {
            // Превращаем в нижний регистр для поиска
            let title = (item.gift_title || "").toLowerCase();
            let model = (item.name || "").toLowerCase();

            // Проверяем совпадение либо с названием подарка, либо с моделью
            if (title.includes(searchName) || model.includes(searchName)) {
                results.push({ ...item, currentColor: colorName });
            }
        });
    }

    // 3. Вывод результатов
    const resultList = document.getElementById('result-list');
    const block = document.getElementById('analysis-result');
    
    if (results.length === 0) {
        alert("Подарок или модель '" + searchName + "' не найдены.");
        return;
    }

    block.style.display = 'block';
    resultList.innerHTML = `<p style="font-size: 12px; color: #888; margin-bottom: 10px;">Найдено совпадений: ${results.length}</p>`;

    // Рисуем карточку для каждого найденного совпадения
    results.forEach(foundGift => {
        const targetRGB = parseRGB(colorMap[foundGift.currentColor]);
        let rankings = [];

        // Считаем совместимость с 80 цветами
        for (let name in colorMap) {
            const bgRGB = parseRGB(colorMap[name]);
            const dist = Math.sqrt(
                Math.pow(targetRGB[0] - bgRGB[0], 2) + 
                Math.pow(targetRGB[1] - bgRGB[1], 2) + 
                Math.pow(targetRGB[2] - bgRGB[2], 2)
            );
            const score = Math.max(0, Math.min(100, 100 - (dist / 2))).toFixed(1);
            rankings.push({ name, score });
        }

        rankings.sort((a, b) => b.score - a.score);

        // Создаем элемент карточки
        const card = document.createElement('div');
        card.className = 'result-card'; // Убедись, что у тебя есть стили для этого или добавь inline
        card.style = "background: #252528; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #333;";
        
        card.innerHTML = `
            <img src="${foundGift.path.replace(/\\/g, '/')}" style="width: 60px; height: 60px; object-fit: contain; background: #000; border-radius: 8px;">
            <div style="flex: 1;">
                <div style="font-weight: bold; color: #fff; font-size: 14px;">${foundGift.gift_title}</div>
                <div style="font-size: 11px; color: #888;">Модель: ${foundGift.name} | Фон: ${foundGift.currentColor}</div>
                <div style="margin-top: 5px; color: #00d2ff; font-size: 13px;">
                    Лучшая пара: <b>${rankings[0].name}</b> <span style="color: #aaa;">(${rankings[0].score}%)</span>
                </div>
            </div>
        `;
        resultList.appendChild(card);
    });
}

    function displayResults(results, giftName) {
        const block = document.getElementById('analysis-result');
        const list = document.getElementById('result-list');
        block.style.display = 'block';
        list.innerHTML = `<p style="color:var(--accent); font-weight:bold; margin-bottom:10px;">${giftName}</p>`;

        results.forEach(res => {
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `
                <div class="color-dot" style="background:${res.color}"></div>
                <span>${res.name}</span>
                <span style="margin-left:auto; color:#888;">${res.score}%</span>
            `;
            list.appendChild(item);
        });
    }

    function parseRGB(str) {
        return str.match(/\d+/g).map(Number);
    }

    function render(color) {
        const container = document.getElementById('container');
        container.innerHTML = '';
        let items = (color === 'all') 
            ? [].concat(...Object.values(giftData))
            : giftData[color];

        // Уникальность по путям
        items = Array.from(new Map(items.map(i => [i.path, i])).values());

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.path.replace(/\\/g, '/')}" loading="lazy">
                <div class="info" title="${item.name}">${item.name}</div>
            `;
            container.appendChild(card);
        });
    }

    function filter(color, btn) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(color);
    }
</script>

</body>
</html>
